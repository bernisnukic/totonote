name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macOS-arm64
          - os: windows-latest
            platform: Windows
          - os: ubuntu-latest
            platform: Linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # better-sqlite3 is a native module rebuilt against Electron's ABI; node-gyp needs Python.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Build distributables
        run: npm run make

      # Rename Forge's jargony defaults (darwin-arm64 / amd64 / x86_64) to user-friendly names.
      # Squirrel-Windows files (RELEASES + .nupkg + Setup.exe) keep their original names —
      # Squirrel's installer/updater requires the exact filenames.
      - name: Rename macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd out/make/zip/darwin/arm64
          for f in TotoNote-darwin-arm64-*.zip; do
            v="${f#TotoNote-darwin-arm64-}"; v="${v%.zip}"
            mv "$f" "TotoNote-${v}-macOS.zip"
          done
          ls

      - name: Rename Linux artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          for f in out/make/deb/x64/totonote_*_amd64.deb; do
            b=$(basename "$f"); v="${b#totonote_}"; v="${v%_amd64.deb}"
            mv "$f" "$(dirname "$f")/TotoNote-${v}-Linux.deb"
          done
          for f in out/make/rpm/x64/totonote-*.x86_64.rpm; do
            b=$(basename "$f"); v="${b#totonote-}"; v="${v%-1.x86_64.rpm}"
            mv "$f" "$(dirname "$f")/TotoNote-${v}-Linux.rpm"
          done
          ls out/make/deb/x64 out/make/rpm/x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totonote-${{ matrix.platform }}
          path: out/make/**/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Only attach the user-facing files; Squirrel internals (RELEASES + .nupkg)
      # exist in the artifact bundle but are not exposed on the public release page.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*-macOS.zip
            artifacts/**/*.Setup.exe
            artifacts/**/*-Linux.deb
            artifacts/**/*-Linux.rpm
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## 📥 Download for your OS

            | OS | File | How to install |
            |----|------|---------------|
            | 🍎 **macOS** (Apple Silicon) | `TotoNote-*-macOS.zip` | Unzip and drag the app to **Applications**. First launch: **right-click → Open** to bypass Gatekeeper. |
            | 🪟 **Windows** | `TotoNote-*.Setup.exe` | Double-click to install. On SmartScreen: **More info → Run anyway**. |
            | 🐧 **Linux** (Debian/Ubuntu) | `TotoNote-*-Linux.deb` | `sudo dpkg -i TotoNote-*-Linux.deb` |
            | 🐧 **Linux** (RHEL/Fedora) | `TotoNote-*-Linux.rpm` | `sudo rpm -i TotoNote-*-Linux.rpm` |

            Builds are **unsigned** (ad-hoc on macOS) — that's why your OS warns on first launch.
